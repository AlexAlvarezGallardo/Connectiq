syntax = "proto3";

option csharp_namespace = "Connectiq.GrpcUsers";

package users; 

import "google/protobuf/timestamp.proto";

message User {
	string id = 1;
	string username = 2; 
	string password = 3;
	repeated Role roles = 4;
}

enum Role {
    NONE = 0;
    USER = 1;
    ADMIN = 2;
    SUPER_ADMIN = 3;
}