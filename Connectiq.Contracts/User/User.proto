syntax = "proto3";

option csharp_namespace = "Connectiq.GrpcUsers";

package users; 

import "google/protobuf/timestamp.proto";

message User {
	string id = 1;
	string username = 2; 
	string password_hash = 4;
	string email = 3; 
	repeated Role roles = 5;
	google.protobuf.Timestamp created_at = 6;
	bool is_active = 7;
}

enum Role {
    NONE = 0;
    USER = 1;
    ADMIN = 2;
    SUPER_ADMIN = 3;
}